name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 app.py config.py models.py \
            --max-line-length=120 \
            --ignore=E501,W503
