<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Manager Pro — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #4A148C 0%, #7B1FA2 50%, #9C27B0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .login-header {
      background: #4A148C;
      padding: 32px 30px 24px;
      text-align: center;
      color: white;
    }
    .login-header .logo {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .login-header .logo svg { width: 32px; height: 32px; }
    .login-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-header p { font-size: 13px; color: #CE93D8; }
    .login-body { padding: 30px; }
    .login-tabs {
      display: flex;
      border-bottom: 2px solid #E0E0E0;
      margin-bottom: 24px;
    }
    .login-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #999;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }
    .login-tab.active { color: #4A148C; border-bottom-color: #4A148C; }
    .login-tab:hover { color: #666; }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #546E7A;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: #7B1FA2;
      box-shadow: 0 0 0 3px rgba(123,31,162,.1);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #4A148C;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      margin-top: 6px;
    }
    .btn-login:hover { background: #6A1B9A; }
    .btn-login:disabled { background: #B0B0B0; cursor: not-allowed; }
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error { display: block; background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
    .alert.success { display: block; background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .login-footer {
      text-align: center;
      padding: 0 30px 24px;
      font-size: 12px;
      color: #9E9E9E;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="logo">
      <svg viewBox="0 0 26 26" fill="none">
        <path d="M7 18 L13 7 L19 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.5 14 H16.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Business Manager Pro</h1>
    <p>Gestion multi-etablissements</p>
  </div>

  <div class="login-body">
    <div id="alert" class="alert"></div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="showPanel('login')">Connexion</button>
      <button class="login-tab" onclick="showPanel('register')">Inscription</button>
    </div>

    <!-- Login -->
    <div id="panel-login" class="form-panel active">
      <form onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="votre@email.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="login-password" required placeholder="Votre mot de passe" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="btn-login">Se connecter</button>
      </form>
    </div>

    <!-- Register -->
    <div id="panel-register" class="form-panel">
      <form onsubmit="return handleRegister(event)">
        <div class="form-group">
          <label>Nom complet</label>
          <input type="text" id="reg-name" required placeholder="Jean Dupont">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required placeholder="votre@email.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="reg-password" required placeholder="Min. 6 caracteres" minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe</label>
          <input type="password" id="reg-password2" required placeholder="Confirmez" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-login" id="btn-register">Creer un compte</button>
      </form>
    </div>
  </div>

  <div class="login-footer">
    Business Manager Pro &copy; 2026
  </div>
</div>

<script>
function showPanel(panel) {
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
  event.target.classList.add('active');
  hideAlert();
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type;
}
function hideAlert() {
  document.getElementById('alert').className = 'alert';
}

async function handleLogin(e) {
  e.preventDefault();
  hideAlert();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Connexion...';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      showAlert(data.error || 'Identifiants incorrects.', 'error');
    }
  } catch (err) {
    showAlert('Erreur de connexion au serveur.', 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Se connecter';
  return false;
}

async function handleRegister(e) {
  e.preventDefault();
  hideAlert();
  const pw  = document.getElementById('reg-password').value;
  const pw2 = document.getElementById('reg-password2').value;
  if (pw !== pw2) { showAlert('Les mots de passe ne correspondent pas.', 'error'); return false; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Creation...';

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: pw
      })
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('Compte cree ! Vous pouvez vous connecter.', 'success');
      showPanel('login');
      document.querySelectorAll('.login-tab')[0].classList.add('active');
      document.querySelectorAll('.login-tab')[1].classList.remove('active');
    } else {
      showAlert(data.error || 'Erreur lors de la creation.', 'error');
    }
  } catch (err) {
    showAlert('Erreur de connexion au serveur.', 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Creer un compte';
  return false;
}
</script>

</body>
</html>
