<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Manager Pro — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:       #130D1A;
      --dark-mid:   #1C1228;
      --violet:     #5B21B6;
      --violet-mid: #7C3AED;
      --orange:     #F59E0B;
      --gold:       #FDE68A;
      --gold-dim:   #C9A84C;
      --white:      #FFFFFF;
      --off-white:  #FAFAF8;
      --muted:      #6B7280;
      --error-bg:   rgba(220,38,38,0.08);
      --error-text: #B91C1C;
      --success-bg: rgba(5,150,105,0.08);
      --success-text:#065F46;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      background: var(--dark);
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       LEFT PANEL — Dark / Animated
    ══════════════════════════════════════════ */
    .panel-left {
      flex: 0 0 48%;
      position: relative;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      overflow: hidden;
    }

    /* Grain texture overlay */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* Radial glow behind brand */
    .panel-left::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 480px;
      background: radial-gradient(ellipse, rgba(91,33,182,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating Orbs ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      animation: floatOrb var(--dur) ease-in-out infinite alternate;
      opacity: 0.5;
      pointer-events: none;
    }
    .orb-1 {
      width: 240px; height: 240px;
      background: radial-gradient(circle, #5B21B6 0%, transparent 70%);
      top: -60px; left: -80px;
      --dur: 7s;
    }
    .orb-2 {
      width: 180px; height: 180px;
      background: radial-gradient(circle, #F59E0B 0%, transparent 70%);
      bottom: -40px; right: -50px;
      --dur: 9s;
      animation-delay: -3s;
    }
    .orb-3 {
      width: 130px; height: 130px;
      background: radial-gradient(circle, #FDE68A 0%, transparent 70%);
      top: 30%; right: 10%;
      --dur: 11s;
      animation-delay: -5s;
      opacity: 0.3;
    }
    .orb-4 {
      width: 100px; height: 100px;
      background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
      bottom: 25%; left: 5%;
      --dur: 8s;
      animation-delay: -2s;
      opacity: 0.35;
    }

    @keyframes floatOrb {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, -30px) scale(1.08); }
    }

    /* ── Geometric Shapes ── */
    .geo-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .diamond {
      position: absolute;
      width: var(--sz);
      height: var(--sz);
      border: 1px solid var(--clr);
      transform: rotate(45deg) translateY(0);
      animation: spinDiamond var(--dur) linear infinite, floatDiamond var(--fdur) ease-in-out infinite alternate;
      opacity: var(--op);
    }
    .diamond::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--clr);
      opacity: 0.4;
    }

    .d1 { --sz:80px; --clr:rgba(253,230,138,0.6); --op:0.8; top:12%; left:8%;  --dur:28s; --fdur:6s; }
    .d2 { --sz:52px; --clr:rgba(245,158,11,0.7);  --op:0.6; top:65%; left:15%; --dur:20s; --fdur:8s; animation-delay:-4s; }
    .d3 { --sz:36px; --clr:rgba(124,58,237,0.8);  --op:0.7; top:20%; right:12%; --dur:35s; --fdur:7s; animation-delay:-8s; }
    .d4 { --sz:64px; --clr:rgba(253,230,138,0.4); --op:0.5; bottom:18%; right:8%; --dur:22s; --fdur:9s; animation-delay:-2s; }
    .d5 { --sz:28px; --clr:rgba(245,158,11,0.6);  --op:0.9; top:80%; left:55%; --dur:18s; --fdur:5s; animation-delay:-6s; }
    .d6 { --sz:44px; --clr:rgba(91,33,182,0.7);   --op:0.6; top:45%; left:5%;  --dur:30s; --fdur:10s; animation-delay:-11s; }

    @keyframes spinDiamond {
      from { transform: rotate(45deg); }
      to   { transform: rotate(405deg); }
    }
    @keyframes floatDiamond {
      from { margin-top: 0; }
      to   { margin-top: -18px; }
    }

    /* Decorative horizontal lines */
    .deco-lines {
      position: absolute;
      bottom: 52px;
      left: 40px;
      right: 40px;
      z-index: 2;
      opacity: 0.25;
    }
    .deco-lines span {
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, #FDE68A, transparent);
      margin-bottom: 5px;
      animation: linePulse 3s ease-in-out infinite alternate;
    }
    .deco-lines span:nth-child(2) { animation-delay: 0.4s; opacity: 0.6; }
    .deco-lines span:nth-child(3) { animation-delay: 0.8s; opacity: 0.4; }
    @keyframes linePulse {
      from { opacity: 0.15; }
      to   { opacity: 0.5; }
    }

    /* ── Brand ── */
    .brand {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: brandReveal 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes brandReveal {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-icon {
      width: 76px; height: 76px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(91,33,182,0.3), rgba(245,158,11,0.2));
      border: 1px solid rgba(253,230,138,0.25);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(91,33,182,0.3), inset 0 1px 0 rgba(253,230,138,0.15);
      position: relative;
    }
    .brand-icon::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: linear-gradient(135deg, rgba(91,33,182,0.5), rgba(245,158,11,0.3), rgba(253,230,138,0.4));
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      padding: 1px;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.2;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      text-shadow: 0 0 60px rgba(253,230,138,0.3);
    }

    .brand-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--gold-dim);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* Gradient tag line */
    .brand-tag {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.5;
    }
    .brand-tag::before, .brand-tag::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(253,230,138,0.4));
    }
    .brand-tag::after {
      background: linear-gradient(90deg, rgba(253,230,138,0.4), transparent);
    }
    .brand-tag span {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    /* ══════════════════════════════════════════
       RIGHT PANEL — White / Form
    ══════════════════════════════════════════ */
    .panel-right {
      flex: 1;
      background: var(--off-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
      animation: panelSlide 0.7s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.15s;
    }
    @keyframes panelSlide {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Subtle top-left geometric accent */
    .panel-right::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border: 1px solid rgba(91,33,182,0.08);
      border-radius: 50%;
      pointer-events: none;
    }
    .panel-right::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 50%;
      pointer-events: none;
    }

    .form-card {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .form-heading {
      margin-bottom: 32px;
    }
    .form-heading h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: #1C0F2E;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .form-heading p {
      font-size: 13.5px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: #EDECE8;
      border-radius: 10px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.25s ease;
      color: var(--muted);
      background: transparent;
    }
    .tab-btn.active {
      background: var(--white);
      color: #1C0F2E;
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .tab-btn:hover:not(.active) { color: #1C0F2E; }

    /* ── Alert ── */
    .alert {
      display: none;
      padding: 11px 15px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      border-left: 3px solid;
      animation: alertIn 0.3s ease;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert.error {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--error-bg);
      color: var(--error-text);
      border-color: #EF4444;
    }
    .alert.success {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--success-bg);
      color: var(--success-text);
      border-color: #10B981;
    }

    /* ── Form Panels ── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* ── Form Groups ── */
    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: #4B5563;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: #9CA3AF;
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid #E5E7EB;
      border-radius: 9px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: #1C0F2E;
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: #C4C9D4; }
    .form-group input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3.5px rgba(245,158,11,0.14);
    }
    .form-group input:focus + svg,
    .input-wrap:focus-within svg {
      color: var(--orange);
    }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      background: linear-gradient(135deg, var(--violet) 0%, #9333EA 40%, var(--orange) 100%);
      color: var(--gold);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(91,33,182,0.25);
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-submit:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(91,33,182,0.35);
    }
    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-submit:disabled {
      background: #D1D5DB;
      color: #9CA3AF;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Loading spinner inside button */
    .btn-submit .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(253,230,138,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }
    .btn-submit.loading .spinner { display: inline-block; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Divider ── */
    .form-divider {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #C4C9D4;
    }

    /* ── Footer ── */
    .right-footer {
      position: absolute;
      bottom: 24px;
      font-size: 11.5px;
      color: #C4C9D4;
      letter-spacing: 0.3px;
    }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      body { flex-direction: column; overflow: auto; }

      .panel-left {
        flex: 0 0 auto;
        padding: 40px 24px 32px;
        min-height: 260px;
      }
      .brand-title { font-size: 22px; }
      .orb-1 { width: 160px; height: 160px; }
      .orb-2 { width: 120px; height: 120px; }

      .panel-right {
        flex: 1;
        padding: 36px 24px 48px;
      }

      .deco-lines { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════ LEFT PANEL ═══════════ -->
<div class="panel-left">

  <!-- Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <!-- Diamonds -->
  <div class="geo-canvas">
    <div class="diamond d1"></div>
    <div class="diamond d2"></div>
    <div class="diamond d3"></div>
    <div class="diamond d4"></div>
    <div class="diamond d5"></div>
    <div class="diamond d6"></div>
  </div>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <!-- Briefcase SVG -->
      <svg width="38" height="34" viewBox="0 0 38 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="11" width="32" height="20" rx="4" fill="none" stroke="#FDE68A" stroke-width="2.2"/>
        <path d="M13 11V8C13 6.9 13.9 6 15 6H23C24.1 6 25 6.9 25 8V11" stroke="#FDE68A" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="3" y1="20" x2="35" y2="20" stroke="#FDE68A" stroke-width="1.6" stroke-dasharray="3 2" opacity="0.5"/>
        <circle cx="19" cy="20" r="2.5" fill="#F59E0B"/>
      </svg>
    </div>

    <h1 class="brand-title">Business Manager Pro</h1>
    <p class="brand-sub">Gestion multi-établissements</p>

    <div class="brand-tag">
      <span>Gérez. Analysez. Décidez.</span>
    </div>
  </div>

  <!-- Bottom decorative lines -->
  <div class="deco-lines">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- ═══════════ RIGHT PANEL ═══════════ -->
<div class="panel-right">

  <div class="form-card">
    <div class="form-heading">
      <h2>Bienvenue</h2>
      <p>Connectez-vous pour accéder à votre espace</p>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="showPanel('login', this)">Connexion</button>
      <button class="tab-btn" id="tab-register" onclick="showPanel('register', this)">Inscription</button>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert" role="alert"></div>

    <!-- ── LOGIN FORM ── -->
    <div id="panel-login" class="form-panel active">
      <form onsubmit="return handleLogin(event)">

        <div class="form-group">
          <label for="login-email">Adresse email</label>
          <div class="input-wrap">
            <input type="email" id="login-email" required placeholder="votre@email.fr" autocomplete="email">
            <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="login-password" required placeholder="Votre mot de passe" autocomplete="current-password">
            <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-login">
          <span class="spinner"></span>Se connecter
        </button>
      </form>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div id="panel-register" class="form-panel">
      <form onsubmit="return handleRegister(event)">

        <div class="form-group">
          <label for="reg-name">Nom complet</label>
          <div class="input-wrap">
            <input type="text" id="reg-name" required placeholder="Jean Dupont">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Adresse email</label>
          <div class="input-wrap">
            <input type="email" id="reg-email" required placeholder="votre@email.fr" autocomplete="email">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-password">Mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="reg-password" required placeholder="Minimum 6 caractères" minlength="6" autocomplete="new-password">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-password2">Confirmer le mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="reg-password2" required placeholder="Confirmez" autocomplete="new-password">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-register">
          <span class="spinner"></span>Créer un compte
        </button>
      </form>
    </div>

    <div class="form-divider">Business Manager Pro &copy; 2026</div>
  </div>

  <span class="right-footer">Sécurisé &amp; chiffré</span>
</div>

<script>
  /* ── Panel switcher ── */
  function showPanel(panel, tab) {
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
    if (tab) tab.classList.add('active');
    hideAlert();
  }

  /* ── Alert helpers ── */
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    const icon = type === 'error'
      ? '<svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>'
      : '<svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>';
    el.innerHTML = icon + msg;
    el.className = 'alert ' + type;
  }
  function hideAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
    el.innerHTML = '';
  }

  /* ── Login ── */
  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.lastChild.textContent = 'Connexion…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        btn.lastChild.textContent = 'Redirection…';
        window.location.href = '/';
        return false;
      } else {
        showAlert(data.error || 'Identifiants incorrects.', 'error');
      }
    } catch {
      showAlert('Erreur de connexion au serveur.', 'error');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.lastChild.textContent = 'Se connecter';
    return false;
  }

  /* ── Register ── */
  async function handleRegister(e) {
    e.preventDefault();
    hideAlert();
    const pw  = document.getElementById('reg-password').value;
    const pw2 = document.getElementById('reg-password2').value;
    if (pw !== pw2) { showAlert('Les mots de passe ne correspondent pas.', 'error'); return false; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.lastChild.textContent = 'Création…';

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:     document.getElementById('reg-name').value,
          email:    document.getElementById('reg-email').value,
          password: pw
        })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert('Compte créé ! Vous pouvez maintenant vous connecter.', 'success');
        showPanel('login', document.getElementById('tab-login'));
      } else {
        showAlert(data.error || 'Erreur lors de la création.', 'error');
      }
    } catch {
      showAlert('Erreur de connexion au serveur.', 'error');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.lastChild.textContent = 'Créer un compte';
    return false;
  }
</script>
</body>
</html>
