<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Manager Pro — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:       #0D0814;
      --dark-mid:   #160E22;
      --dark-card:  #1A1030;
      --violet:     #5B21B6;
      --violet-mid: #7C3AED;
      --orange:     #F59E0B;
      --gold:       #FDE68A;
      --gold-dim:   #C9A84C;
      --white:      #FFFFFF;
      --glass:      rgba(255,255,255,0.04);
      --glass-border: rgba(253,230,138,0.12);
      --input-bg:   rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.12);
      --muted:      rgba(255,255,255,0.35);
      --error-bg:   rgba(220,38,38,0.12);
      --error-text: #FCA5A5;
      --success-bg: rgba(5,150,105,0.12);
      --success-text:#6EE7B7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      background: var(--dark);
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       LEFT PANEL
    ══════════════════════════════════════════ */
    .panel-left {
      flex: 0 0 48%;
      position: relative;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      overflow: hidden;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .panel-left::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 520px; height: 520px;
      background: radial-gradient(ellipse, rgba(91,33,182,0.28) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      animation: floatOrb var(--dur) ease-in-out infinite alternate;
      opacity: 0.5;
      pointer-events: none;
    }
    .orb-1 { width:240px; height:240px; background:radial-gradient(circle,#5B21B6 0%,transparent 70%); top:-60px; left:-80px; --dur:7s; }
    .orb-2 { width:180px; height:180px; background:radial-gradient(circle,#F59E0B 0%,transparent 70%); bottom:-40px; right:-50px; --dur:9s; animation-delay:-3s; }
    .orb-3 { width:130px; height:130px; background:radial-gradient(circle,#FDE68A 0%,transparent 70%); top:30%; right:10%; --dur:11s; animation-delay:-5s; opacity:0.25; }
    .orb-4 { width:100px; height:100px; background:radial-gradient(circle,#7C3AED 0%,transparent 70%); bottom:25%; left:5%; --dur:8s; animation-delay:-2s; opacity:0.3; }

    @keyframes floatOrb {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(20px,-30px) scale(1.08); }
    }

    /* Diamonds */
    .geo-canvas { position:absolute; inset:0; pointer-events:none; z-index:0; }

    .diamond {
      position: absolute;
      width: var(--sz); height: var(--sz);
      border: 1px solid var(--clr);
      transform: rotate(45deg);
      animation: spinDiamond var(--dur) linear infinite, floatDiamond var(--fdur) ease-in-out infinite alternate;
      opacity: var(--op);
    }
    .diamond::before { content:''; position:absolute; inset:4px; border:1px solid var(--clr); opacity:0.4; }

    .d1 { --sz:80px; --clr:rgba(253,230,138,0.6); --op:0.8; top:12%; left:8%;   --dur:28s; --fdur:6s; }
    .d2 { --sz:52px; --clr:rgba(245,158,11,0.7);  --op:0.6; top:65%; left:15%;  --dur:20s; --fdur:8s; animation-delay:-4s; }
    .d3 { --sz:36px; --clr:rgba(124,58,237,0.8);  --op:0.7; top:20%; right:12%; --dur:35s; --fdur:7s; animation-delay:-8s; }
    .d4 { --sz:64px; --clr:rgba(253,230,138,0.4); --op:0.5; bottom:18%; right:8%; --dur:22s; --fdur:9s; animation-delay:-2s; }
    .d5 { --sz:28px; --clr:rgba(245,158,11,0.6);  --op:0.9; top:80%; left:55%;  --dur:18s; --fdur:5s; animation-delay:-6s; }
    .d6 { --sz:44px; --clr:rgba(91,33,182,0.7);   --op:0.6; top:45%; left:5%;   --dur:30s; --fdur:10s; animation-delay:-11s; }

    @keyframes spinDiamond { from { transform:rotate(45deg); } to { transform:rotate(405deg); } }
    @keyframes floatDiamond { from { margin-top:0; } to { margin-top:-18px; } }

    .deco-lines { position:absolute; bottom:52px; left:40px; right:40px; z-index:2; opacity:0.2; }
    .deco-lines span { display:block; height:1px; background:linear-gradient(90deg,transparent,#FDE68A,transparent); margin-bottom:5px; animation:linePulse 3s ease-in-out infinite alternate; }
    .deco-lines span:nth-child(2) { animation-delay:0.4s; opacity:0.6; }
    .deco-lines span:nth-child(3) { animation-delay:0.8s; opacity:0.4; }
    @keyframes linePulse { from { opacity:0.1; } to { opacity:0.45; } }

    /* Brand */
    .brand {
      position: relative; z-index: 2; text-align: center;
      animation: brandReveal 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes brandReveal { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }

    .brand-icon {
      width:80px; height:80px; margin:0 auto 26px;
      background: linear-gradient(135deg, rgba(91,33,182,0.35), rgba(245,158,11,0.22));
      border: 1px solid rgba(253,230,138,0.3);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 50px rgba(91,33,182,0.35), inset 0 1px 0 rgba(253,230,138,0.2);
      position: relative;
    }
    .brand-icon::after {
      content: ''; position:absolute; inset:-1px; border-radius:23px;
      background: linear-gradient(135deg, rgba(91,33,182,0.5), rgba(245,158,11,0.3), rgba(253,230,138,0.4));
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude; padding:1px;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px; font-weight: 700;
      color: var(--gold); line-height: 1.2;
      letter-spacing: -0.3px; margin-bottom: 10px;
      text-shadow: 0 0 80px rgba(253,230,138,0.35);
    }

    .brand-sub {
      font-size: 11px; font-weight: 400;
      color: var(--gold-dim); letter-spacing: 2px;
      text-transform: uppercase; opacity: 0.65;
    }

    .brand-tag {
      margin-top: 36px; display:flex; align-items:center; gap:14px; opacity:0.4;
    }
    .brand-tag::before { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(253,230,138,0.5)); }
    .brand-tag::after  { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(253,230,138,0.5),transparent); }
    .brand-tag span { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold-dim); white-space:nowrap; }

    /* ══════════════════════════════════════════
       RIGHT PANEL — Dark Glass
    ══════════════════════════════════════════ */
    .panel-right {
      flex: 1;
      background: var(--dark-mid);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
      animation: panelSlide 0.7s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.15s;
    }
    @keyframes panelSlide { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }

    /* Subtle glow accents */
    .panel-right::before {
      content: ''; position:absolute;
      top:-120px; right:-120px;
      width:360px; height:360px;
      background: radial-gradient(ellipse, rgba(91,33,182,0.15) 0%, transparent 65%);
      pointer-events: none;
    }
    .panel-right::after {
      content: ''; position:absolute;
      bottom:-80px; left:-80px;
      width:260px; height:260px;
      background: radial-gradient(ellipse, rgba(245,158,11,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Glass card */
    .form-card {
      width: 100%; max-width: 380px;
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(253,230,138,0.1);
      border-radius: 20px;
      padding: 36px 32px 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(253,230,138,0.08);
    }

    /* Thin gold top accent */
    .form-card::before {
      content: ''; position:absolute; top:0; left:10%; right:10%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(253,230,138,0.5), transparent);
      border-radius: 1px;
    }

    /* Heading — just the title, no subtitle */
    .form-heading {
      margin-bottom: 28px;
      text-align: center;
    }
    .form-heading h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      color: var(--gold);
      letter-spacing: -0.2px;
    }

    /* Tabs */
    .tab-bar {
      display: flex; gap: 3px; margin-bottom: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 3px;
    }
    .tab-btn {
      flex: 1; padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      border: none; border-radius: 7px;
      cursor: pointer;
      transition: all 0.25s ease;
      color: var(--muted);
      background: transparent;
    }
    .tab-btn.active {
      background: rgba(91,33,182,0.5);
      color: var(--gold);
      font-weight: 600;
      box-shadow: 0 2px 12px rgba(91,33,182,0.3);
    }
    .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }

    /* Alert */
    .alert {
      display: none; padding: 10px 14px; border-radius: 9px;
      font-size: 12.5px; font-weight: 500; margin-bottom: 18px;
      border-left: 3px solid; animation: alertIn 0.3s ease;
    }
    @keyframes alertIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .alert.error  { display:flex; align-items:center; gap:8px; background:var(--error-bg);   color:var(--error-text);   border-color:#EF4444; }
    .alert.success{ display:flex; align-items:center; gap:8px; background:var(--success-bg); color:var(--success-text); border-color:#10B981; }

    /* Form panels */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* Form groups — NO labels */
    .form-group { margin-bottom: 14px; }

    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: rgba(255,255,255,0.25);
      pointer-events: none; transition: color 0.2s;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1px solid var(--input-border);
      border-radius: 10px;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      color: rgba(255,255,255,0.85);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }
    .form-group input:focus {
      border-color: rgba(245,158,11,0.55);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
    }
    .input-wrap:focus-within svg { color: rgba(245,158,11,0.7); }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 13px; margin-top: 6px;
      background: linear-gradient(135deg, #5B21B6 0%, #9333EA 45%, #F59E0B 100%);
      color: var(--gold);
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.4px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(91,33,182,0.35);
    }
    .btn-submit::before {
      content: ''; position:absolute; inset:0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn-submit:hover:not(:disabled) { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 8px 32px rgba(91,33,182,0.45); }
    .btn-submit:active:not(:disabled) { transform:translateY(0); }
    .btn-submit:disabled { background:#2D2040; color:rgba(255,255,255,0.2); cursor:not-allowed; box-shadow:none; }

    .btn-submit .spinner {
      display: none; width:13px; height:13px;
      border: 2px solid rgba(253,230,138,0.3);
      border-top-color: var(--gold); border-radius:50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 7px;
    }
    .btn-submit.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      body { flex-direction: column; overflow: auto; }
      .panel-left { flex:0 0 auto; padding:40px 24px 32px; min-height:240px; }
      .brand-title { font-size:22px; }
      .orb-1 { width:160px; height:160px; }
      .orb-2 { width:120px; height:120px; }
      .panel-right { flex:1; padding:32px 20px 48px; background:var(--dark); }
      .deco-lines { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════ LEFT PANEL ═══════════ -->
<div class="panel-left">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <div class="geo-canvas">
    <div class="diamond d1"></div>
    <div class="diamond d2"></div>
    <div class="diamond d3"></div>
    <div class="diamond d4"></div>
    <div class="diamond d5"></div>
    <div class="diamond d6"></div>
  </div>

  <div class="brand">
    <div class="brand-icon">
      <svg width="38" height="34" viewBox="0 0 38 34" fill="none">
        <rect x="3" y="11" width="32" height="20" rx="4" stroke="#FDE68A" stroke-width="2.2"/>
        <path d="M13 11V8C13 6.9 13.9 6 15 6H23C24.1 6 25 6.9 25 8V11" stroke="#FDE68A" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="3" y1="20" x2="35" y2="20" stroke="#FDE68A" stroke-width="1.6" stroke-dasharray="3 2" opacity="0.5"/>
        <circle cx="19" cy="20" r="2.5" fill="#F59E0B"/>
      </svg>
    </div>
    <h1 class="brand-title">Business Manager Pro</h1>
    <p class="brand-sub">Gestion multi-établissements</p>
    <div class="brand-tag"><span>Gérez · Analysez · Décidez</span></div>
  </div>

  <div class="deco-lines"><span></span><span></span><span></span></div>
</div>

<!-- ═══════════ RIGHT PANEL ═══════════ -->
<div class="panel-right">
  <div class="form-card">

    <div class="form-heading"><h2>Bienvenue</h2></div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="showPanel('login', this)">Connexion</button>
      <button class="tab-btn" id="tab-register" onclick="showPanel('register', this)">Inscription</button>
    </div>

    <div id="alert" class="alert" role="alert"></div>

    <!-- LOGIN -->
    <div id="panel-login" class="form-panel active">
      <form onsubmit="return handleLogin(event)">
        <div class="form-group">
          <div class="input-wrap">
            <input type="email" id="login-email" required placeholder="votre@email.fr" autocomplete="email">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
          </div>
        </div>
        <div class="form-group">
          <div class="input-wrap">
            <input type="password" id="login-password" required placeholder="Mot de passe" autocomplete="current-password">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btn-login">
          <span class="spinner"></span>Se connecter
        </button>
      </form>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" class="form-panel">
      <form onsubmit="return handleRegister(event)">
        <div class="form-group">
          <div class="input-wrap">
            <input type="text" id="reg-name" required placeholder="Nom complet">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
          </div>
        </div>
        <div class="form-group">
          <div class="input-wrap">
            <input type="email" id="reg-email" required placeholder="votre@email.fr" autocomplete="email">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
          </div>
        </div>
        <div class="form-group">
          <div class="input-wrap">
            <input type="password" id="reg-password" required placeholder="Mot de passe (6 car. min.)" minlength="6" autocomplete="new-password">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          </div>
        </div>
        <div class="form-group">
          <div class="input-wrap">
            <input type="password" id="reg-password2" required placeholder="Confirmer" autocomplete="new-password">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btn-register">
          <span class="spinner"></span>Créer un compte
        </button>
      </form>
    </div>

  </div>
</div>

<script>
  /* ── Panel switcher ── */
  function showPanel(panel, tab) {
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
    if (tab) tab.classList.add('active');
    hideAlert();
  }

  /* ── Alert helpers ── */
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    const icon = type === 'error'
      ? '<svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>'
      : '<svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>';
    el.innerHTML = icon + msg;
    el.className = 'alert ' + type;
  }
  function hideAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
    el.innerHTML = '';
  }

  /* ── Login ── */
  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.lastChild.textContent = 'Connexion…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        btn.lastChild.textContent = 'Redirection…';
        window.location.href = '/';
        return false;
      } else {
        showAlert(data.error || 'Identifiants incorrects.', 'error');
      }
    } catch {
      showAlert('Erreur de connexion au serveur.', 'error');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.lastChild.textContent = 'Se connecter';
    return false;
  }

  /* ── Register ── */
  async function handleRegister(e) {
    e.preventDefault();
    hideAlert();
    const pw  = document.getElementById('reg-password').value;
    const pw2 = document.getElementById('reg-password2').value;
    if (pw !== pw2) { showAlert('Les mots de passe ne correspondent pas.', 'error'); return false; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.lastChild.textContent = 'Création…';

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:     document.getElementById('reg-name').value,
          email:    document.getElementById('reg-email').value,
          password: pw
        })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert('Compte créé ! Vous pouvez maintenant vous connecter.', 'success');
        showPanel('login', document.getElementById('tab-login'));
      } else {
        showAlert(data.error || 'Erreur lors de la création.', 'error');
      }
    } catch {
      showAlert('Erreur de connexion au serveur.', 'error');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
    btn.lastChild.textContent = 'Créer un compte';
    return false;
  }
</script>
</body>
</html>
